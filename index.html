<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duty Log | St John Ambulance Cymru</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --navy: #1B263B; --green: #00853F; --light-bg: #F8F9FA; }
        body { font-family: 'Inter', sans-serif; background-color: var(--light-bg); -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* Skeleton Shimmer Effect */
        .skeleton { background: #e2e8f0; position: relative; overflow: hidden; border-radius: 0.5rem; }
        .skeleton::after {
            content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0.5) 60%, rgba(255,255,255,0));
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #94A3B8; cursor: pointer; border: none; background: none; transition: all 0.2s; flex: 1; }
        .nav-item.active { color: var(--green); transform: translateY(-2px); }
        
        main { max-width: 600px; margin: 0 auto; padding-bottom: 7rem; min-height: 100vh; }
        .input-field { width: 100%; padding: 1rem; border-radius: 1rem; border: 1px solid #e2e8f0; outline: none; transition: border-color 0.2s; background: white; }
        .input-field:focus { border-color: var(--green); }
        
        /* Faster transitions */
        .fade-enter { opacity: 0; transform: translateY(5px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.2s ease-out; }
    </style>
</head>
<body>
    <div id="app">
        <!-- The UI is visible immediately, only data is swapped -->
        <main id="view-container" class="px-4 pt-6"></main>

        <!-- Bottom Navigation - Hidden until session is confirmed -->
        <nav id="bottom-nav" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[600px] hidden bg-white border-t px-6 py-3 justify-between items-center z-40 shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
            <button onclick="router.navigate('dashboard')" class="nav-item active" data-view="dashboard">
                <i class="fas fa-home text-lg"></i><span>Home</span>
            </button>
            <button onclick="router.navigate('progress')" class="nav-item" data-view="progress">
                <i class="fas fa-history text-lg"></i><span>History</span>
            </button>
            <button onclick="router.navigate('add-duty')" class="nav-item bg-[#00853F] !text-white p-3 -mt-10 rounded-full shadow-lg h-14 w-14 justify-center active:scale-95 transition-all">
                <i class="fas fa-plus text-xl"></i>
            </button>
            <button onclick="router.navigate('community')" class="nav-item" data-view="community">
                <i class="fas fa-users text-lg"></i><span>Feed</span>
            </button>
            <button onclick="router.navigate('profile')" class="nav-item" data-view="profile">
                <i class="fas fa-user text-lg"></i><span>Profile</span>
            </button>
        </nav>
    </div>

    <script>
        const supabaseUrl = 'https://qgyjfyazkkepmkztnezv.supabase.co';
        const supabaseKey = 'sb_publishable_xea7e2zxnarbh2bT6vG5ew__2DhOj34';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        const state = { user: null, profile: null };

        const router = {
            navigate: async (view) => {
                const container = document.getElementById('view-container');
                const nav = document.getElementById('bottom-nav');
                const isAuthView = ['welcome', 'login', 'signup'].includes(view);
                
                nav.classList.toggle('hidden', isAuthView);
                nav.classList.toggle('flex', !isAuthView);

                document.querySelectorAll('.nav-item').forEach(el => {
                    el.classList.toggle('active', el.dataset.view === view);
                });

                // Immediate transition
                container.classList.add('fade-enter');
                container.innerHTML = await views[view]();
                
                requestAnimationFrame(() => {
                    container.classList.remove('fade-enter');
                    container.classList.add('fade-enter-active');
                });
            }
        };

        const views = {
            welcome: async () => `
                <div class="flex flex-col items-center justify-center min-h-[80vh] text-center space-y-8">
                    <div class="w-20 h-20 bg-[#00853F] rounded-2xl flex items-center justify-center shadow-xl animate-bounce">
                        <i class="fas fa-plus-square text-white text-4xl"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold">Duty Log</h1>
                        <p class="text-slate-400 text-sm mt-1">St John Ambulance Cymru</p>
                    </div>
                    <div class="w-full space-y-3 px-4 max-w-xs">
                        <button onclick="router.navigate('login')" class="w-full bg-[#1B263B] text-white py-4 rounded-2xl font-bold">Login</button>
                        <button onclick="router.navigate('signup')" class="w-full bg-white border-2 border-[#1B263B] py-4 rounded-2xl font-bold">Sign Up</button>
                    </div>
                </div>`,

            login: async () => `
                <div class="pt-4 max-w-sm mx-auto">
                    <button onclick="router.navigate('welcome')" class="text-slate-400 mb-6 p-2"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-2xl font-bold mb-8 px-2">Welcome Back</h2>
                    <form onsubmit="handleLogin(event)" class="space-y-4 px-2">
                        <input type="email" id="login-email" placeholder="Email Address" required class="input-field">
                        <input type="password" id="login-password" placeholder="Password" required class="input-field">
                        <div id="login-error" class="hidden p-3 bg-red-50 text-red-500 text-xs rounded-lg"></div>
                        <button id="login-btn" type="submit" class="w-full bg-[#1B263B] text-white py-4 rounded-xl font-bold">Sign In</button>
                    </form>
                </div>`,

            signup: async () => `
                <div class="pt-4 max-w-sm mx-auto">
                    <button onclick="router.navigate('welcome')" class="text-slate-400 mb-6 p-2"><i class="fas fa-arrow-left"></i></button>
                    <h2 class="text-2xl font-bold mb-8 px-2">Join the Team</h2>
                    <form onsubmit="handleSignup(event)" class="space-y-4 px-2">
                        <input type="text" id="signup-name" placeholder="Full Name" required class="input-field">
                        <input type="text" id="signup-division" placeholder="Division (e.g. Cardiff)" required class="input-field">
                        <input type="email" id="signup-email" placeholder="Email" required class="input-field">
                        <input type="password" id="signup-password" placeholder="Password" required class="input-field">
                        <button id="signup-btn" type="submit" class="w-full bg-[#00853F] text-white py-4 rounded-xl font-bold">Create Account</button>
                    </form>
                </div>`,

            dashboard: async () => {
                // Show skeleton first
                setTimeout(loadDashboardData, 10);
                return `
                <div class="space-y-6">
                    <header class="flex justify-between items-center px-2">
                        <div class="space-y-1">
                            <div class="h-6 w-32 skeleton"></div>
                            <div class="h-3 w-20 skeleton"></div>
                        </div>
                        <div class="w-10 h-10 rounded-full skeleton"></div>
                    </header>
                    <div class="glass-card p-6 bg-[#1B263B] text-white relative overflow-hidden">
                        <div class="h-3 w-24 skeleton opacity-20 mb-2"></div>
                        <div class="h-10 w-20 skeleton opacity-20"></div>
                    </div>
                    <div class="space-y-3 px-2">
                        <div class="h-4 w-28 skeleton"></div>
                        <div class="h-20 w-full skeleton"></div>
                        <div class="h-20 w-full skeleton"></div>
                    </div>
                </div>`;
            },

            'add-duty': async () => `
                <div>
                    <h2 class="text-2xl font-bold mb-6 px-2">Log New Duty</h2>
                    <form onsubmit="handleSaveDuty(event)" class="space-y-4 px-2">
                        <input type="text" id="duty-title" placeholder="Duty Title" required class="input-field">
                        <input type="text" id="duty-location" placeholder="Location" required class="input-field">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="date" id="duty-date" required class="input-field">
                            <input type="number" step="0.5" id="duty-hours" placeholder="Hours" required class="input-field">
                        </div>
                        <button type="submit" class="w-full bg-[#1B263B] text-white py-4 rounded-xl font-bold shadow-lg mt-4">Save Duty</button>
                    </form>
                </div>`,

            progress: async () => {
                setTimeout(loadHistoryData, 10);
                return `<div class="space-y-6">
                    <h2 class="text-2xl font-bold px-2">Duty History</h2>
                    <div class="space-y-3 px-2">
                        <div class="h-20 w-full skeleton"></div>
                        <div class="h-20 w-full skeleton"></div>
                        <div class="h-20 w-full skeleton"></div>
                    </div>
                </div>`;
            },

            community: async () => {
                setTimeout(loadFeedData, 10);
                return `<div class="space-y-6">
                    <h2 class="text-2xl font-bold px-2">Member Feed</h2>
                    <div class="space-y-4 px-2">
                        <div class="h-16 w-full skeleton"></div>
                        <div class="h-16 w-full skeleton"></div>
                        <div class="h-16 w-full skeleton"></div>
                    </div>
                </div>`;
            },

            profile: async () => `
                <div class="space-y-8 text-center pt-4 px-4">
                    <img src="${state.profile?.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+state.user.id}" class="w-24 h-24 mx-auto rounded-full border-4 border-green-500 object-cover shadow-lg">
                    <div>
                        <h2 class="text-2xl font-bold">${state.profile?.name || 'Member'}</h2>
                        <p class="text-slate-400 text-sm">${state.user.email}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass-card p-4">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Division</p>
                            <p class="font-bold text-slate-700">${state.profile?.division || 'Not Set'}</p>
                        </div>
                        <div class="glass-card p-4">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Status</p>
                            <p class="font-bold text-slate-700">Active</p>
                        </div>
                    </div>
                    <button onclick="handleLogout()" class="w-full p-4 bg-red-50 text-red-500 rounded-2xl font-bold mt-10">Sign Out</button>
                </div>`
        };

        // --- Data Loading Functions (Background) ---

        async function loadDashboardData() {
            const { data: duties } = await sb.from('duties').select('*').eq('user_id', state.user.id).order('date', {ascending:false});
            const totalHours = (duties || []).reduce((acc, curr) => acc + (parseFloat(curr.total_hours) || 0), 0);
            
            document.getElementById('view-container').innerHTML = `
                <div class="space-y-6 fade-enter-active">
                    <header class="flex justify-between items-center px-2">
                        <div>
                            <h1 class="text-xl font-bold">Hi, ${state.profile?.name || 'Member'}</h1>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${state.profile?.division || 'Division Not Set'}</p>
                        </div>
                        <img src="${state.profile?.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+state.user.id}" class="w-10 h-10 rounded-full border-2 border-green-500 object-cover" onclick="router.navigate('profile')">
                    </header>
                    <div class="glass-card p-6 bg-gradient-to-br from-[#1B263B] to-[#0D1B2A] text-white">
                        <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest">Logged Total</p>
                        <div class="flex items-baseline gap-2 mt-1">
                            <h2 class="text-4xl font-black">${totalHours.toFixed(1)}</h2>
                            <span class="text-sm opacity-60">Hours</span>
                        </div>
                    </div>
                    <div class="space-y-3 px-2">
                        <h3 class="font-bold flex justify-between"><span>Recent Duty</span> <button onclick="router.navigate('progress')" class="text-green-600 text-[10px] font-bold">VIEW ALL</button></h3>
                        ${(duties || []).slice(0,3).map(d => `
                            <div class="glass-card p-4 flex justify-between items-center">
                                <div><p class="font-bold text-sm">${d.title}</p><p class="text-[10px] text-slate-400">${d.date}</p></div>
                                <p class="font-black text-[#00853F]">+${d.total_hours}</p>
                            </div>
                        `).join('') || '<p class="text-slate-400 text-center py-10">No logs yet.</p>'}
                    </div>
                </div>`;
        }

        async function loadHistoryData() {
            const { data: duties } = await sb.from('duties').select('*').eq('user_id', state.user.id).order('date', {ascending:false});
            document.getElementById('view-container').innerHTML = `
                <div class="space-y-6 fade-enter-active">
                    <h2 class="text-2xl font-bold px-2">Duty History</h2>
                    <div class="space-y-3 px-2">
                        ${(duties || []).map(d => `
                            <div class="glass-card p-4 flex justify-between items-center">
                                <div><p class="font-bold text-sm">${d.title}</p><p class="text-[10px] text-slate-400">${d.date} • ${d.location}</p></div>
                                <div class="text-right">
                                    <p class="font-black text-slate-700">${d.total_hours}h</p>
                                    <button onclick="deleteDuty(${d.id})" class="text-red-400 text-[10px]"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        `).join('') || '<p class="text-slate-400 text-center py-10">Empty.</p>'}
                    </div>
                </div>`;
        }

        async function loadFeedData() {
            const { data: feeds } = await sb.from('duties').select('*, profiles(name, avatar_url, division)').limit(15).order('created_at', { ascending: false });
            document.getElementById('view-container').innerHTML = `
                <div class="space-y-6 fade-enter-active">
                    <h2 class="text-2xl font-bold px-2">Member Feed</h2>
                    <div class="space-y-4 px-2">
                        ${feeds?.map(f => `
                            <div class="glass-card p-4 flex gap-3">
                                <img src="${f.profiles?.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+f.user_id}" class="w-10 h-10 rounded-full object-cover">
                                <div>
                                    <p class="text-xs"><b>${f.profiles?.name || 'Member'}</b> logged <span class="text-green-600 font-bold">${f.total_hours}h</span></p>
                                    <p class="text-[10px] text-slate-400">${f.title} • ${f.profiles?.division || 'SJA'}</p>
                                </div>
                            </div>
                        `).join('') || '<p class="text-slate-400 text-center py-10">Quiet feed.</p>'}
                    </div>
                </div>`;
        }

        // --- Core Auth & Logic ---

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true; btn.innerText = "Checking...";
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) { document.getElementById('login-error').innerText = error.message; document.getElementById('login-error').classList.remove('hidden'); btn.disabled = false; btn.innerText = "Sign In"; }
        }

        async function handleSaveDuty(e) {
            e.preventDefault();
            const payload = {
                user_id: state.user.id,
                title: document.getElementById('duty-title').value,
                location: document.getElementById('duty-location').value,
                date: document.getElementById('duty-date').value,
                total_hours: parseFloat(document.getElementById('duty-hours').value),
                start_time: '09:00', end_time: '17:00'
            };
            await sb.from('duties').insert([payload]);
            router.navigate('dashboard');
        }

        async function handleLogout() { await sb.auth.signOut(); location.reload(); }

        function init() {
            // Check session immediately
            sb.auth.onAuthStateChange(async (event, session) => {
                if (session) {
                    state.user = session.user;
                    const { data } = await sb.from('profiles').select('*').eq('id', state.user.id).single();
                    state.profile = data || {};
                    router.navigate('dashboard');
                } else {
                    router.navigate('welcome');
                }
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
