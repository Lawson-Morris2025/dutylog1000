<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DutyLog</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DutyLog">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --navy: #1B263B; --green: #00853F; --light-bg: #F8F9FA; }
        body { font-family: 'Inter', sans-serif; background-color: var(--light-bg); -webkit-tap-highlight-color: transparent; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #94A3B8; cursor: pointer; flex: 1; transition: color 0.2s; }
        .nav-item.active { color: var(--green); }
        .input-field { width: 100%; padding: 0.8rem; border-radius: 0.8rem; border: 1px solid #e2e8f0; outline: none; font-size: 16px; transition: border 0.2s; background: white; }
        .input-field:focus { border-color: var(--green); }
        .password-container { position: relative; width: 100%; }
        .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: #94A3B8; cursor: pointer; }
        html, body { overflow: hidden; height: 100%; position: fixed; width: 100%; }
        #view-container { overflow-y: auto; height: 100vh; -webkit-overflow-scrolling: touch; }
        .btn-primary { background: var(--navy); color: white; padding: 1rem; border-radius: 1rem; font-weight: bold; width: 100%; transition: all 0.2s; border: none; cursor: pointer; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-content { background: white; padding: 2rem; border-radius: 1.5rem; width: 100%; max-width: 400px; }
        
        .tab-btn { flex: 1; padding: 8px; font-size: 12px; font-weight: bold; border-radius: 10px; transition: all 0.2s; }
        .tab-btn.active { background: var(--green); color: white; }
        .tab-btn.inactive { background: #f1f5f9; color: #94a3b8; }

        #privacy-lock { position: fixed; inset: 0; background: var(--navy); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }

        .back-btn { display: flex; align-items: center; gap: 8px; color: var(--navy); font-weight: 600; margin-bottom: 2rem; cursor: pointer; }
    </style>
</head>
<body>
    <!-- Privacy Lock Screen -->
    <div id="privacy-lock">
        <div class="mb-8"><i class="fas fa-lock text-6xl text-green-500"></i></div>
        <h2 class="text-2xl font-bold mb-2">DutyLog Locked</h2>
        <p class="text-slate-400 mb-8 px-8">Authentication required to access your logs.</p>
        <button onclick="authenticateBiometrics()" class="bg-green-600 px-8 py-3 rounded-2xl font-bold flex items-center gap-2">
            <i class="fas fa-fingerprint"></i> Unlock App
        </button>
    </div>

    <div id="app">
        <main id="view-container" class="px-4 pt-6 max-w-[600px] mx-auto pb-32"></main>
        
        <nav id="bottom-nav" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[600px] hidden bg-white border-t px-6 py-3 justify-between items-center z-40 shadow-lg pb-safe">
            <button onclick="router.navigate('dashboard')" class="nav-item active" data-view="dashboard"><i class="fas fa-home text-lg"></i><span>Home</span></button>
            <button onclick="router.navigate('users')" class="nav-item" data-view="users"><i class="fas fa-users text-lg"></i><span>Users</span></button>
            <button onclick="router.navigate('add-duty')" class="nav-item bg-white border-2 border-[#00853F] !text-[#00853F] p-3 -mt-10 rounded-full shadow-xl h-14 w-14 justify-center"><i class="fas fa-plus text-xl"></i></button>
            <button onclick="router.navigate('community')" class="nav-item" data-view="community"><i class="fas fa-rss text-lg"></i><span>Feed</span></button>
            <button onclick="router.navigate('profile')" class="nav-item" data-view="profile"><i class="fas fa-user text-lg"></i><span>Profile</span></button>
        </nav>
    </div>

    <script>
        const supabaseUrl = 'https://qgyjfyazkkepmkztnezv.supabase.co';
        const supabaseKey = 'sb_publishable_xea7e2zxnarbh2bT6vG5ew__2DhOj34';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

        const state = { 
            user: null, 
            profile: null, 
            totalHours: 0,
            currentDuties: [],
            hourMode: 'manual',
            isUnlocked: false
        };

        const router = {
            navigate: async (view) => {
                const container = document.getElementById('view-container');
                const nav = document.getElementById('bottom-nav');
                const isAuth = ['welcome', 'login', 'signup'].includes(view);
                nav.classList.toggle('hidden', isAuth);
                nav.classList.toggle('flex', !isAuth);
                document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.getAttribute('data-view') === view));
                container.innerHTML = await views[view]();
            }
        };

        const views = {
            welcome: async () => `<div class="flex flex-col items-center justify-center min-h-[80vh] text-center space-y-8">
                <div class="w-24 h-24 bg-white border-4 border-[#00853F] rounded-[2rem] flex items-center justify-center shadow-2xl"><i class="fas fa-plus text-[#00853F] text-5xl"></i></div>
                <h1 class="text-4xl font-black text-[#1B263B]">DutyLog</h1>
                <div class="w-full space-y-3 px-4 max-w-xs">
                    <button onclick="router.navigate('login')" class="btn-primary">Login</button>
                    <button onclick="router.navigate('signup')" class="w-full bg-white border-2 border-[#1B263B] py-4 rounded-2xl font-bold">Sign Up</button>
                </div>
                <button onclick="handleReportProblem()" class="text-xs text-slate-400 mt-4 underline">Report a problem</button>
            </div>`,
            login: async () => `<div class="pt-4 max-w-sm mx-auto">
                <div onclick="router.navigate('welcome')" class="back-btn"><i class="fas fa-arrow-left"></i> Back</div>
                <h2 class="text-2xl font-bold mb-8">Login</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" id="login-email" placeholder="Email" required class="input-field">
                    <div class="password-container"><input type="password" id="login-password" placeholder="Password" required class="input-field"><i class="fas fa-eye password-toggle" onclick="togglePassword('login-password')"></i></div>
                    <div class="text-right"><button type="button" onclick="handleForgotPassword()" class="text-xs text-green-600 font-bold">Forgot Password?</button></div>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
            </div>`,
            signup: async () => `<div class="pt-4 max-w-sm mx-auto">
                <div onclick="router.navigate('welcome')" class="back-btn"><i class="fas fa-arrow-left"></i> Back</div>
                <h2 class="text-2xl font-bold mb-6">Register</h2>
                <form onsubmit="handleSignup(event)" class="space-y-4">
                    <input type="text" id="signup-name" placeholder="Full Name" required class="input-field">
                    <input type="text" id="signup-division" placeholder="Division" required class="input-field">
                    <input type="email" id="signup-email" placeholder="Email" required class="input-field">
                    <input type="password" id="signup-password" placeholder="Password" required class="input-field">
                    <button type="submit" class="btn-primary">Create Account</button>
                </form>
            </div>`,
            dashboard: async () => {
                setTimeout(loadDashboardData, 10);
                return `<div class="animate-pulse space-y-4"><div class="h-40 bg-slate-200 rounded-2xl"></div></div>`;
            },
            profile: async () => {
                const hasBio = localStorage.getItem(`bio_reg_${state.user?.id}`);
                return `<div class="space-y-8 pt-4 px-4 pb-10">
                    <div class="text-center">
                        <img src="${state.profile?.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+state.user?.id}" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-green-500 shadow-lg object-cover">
                        <h2 class="text-2xl font-bold">${state.profile?.name || 'Volunteer'}</h2>
                        <p class="text-slate-400 text-sm">${state.profile?.division || 'SJA'}</p>
                    </div>
                    
                    <div class="glass-card p-6 space-y-4">
                        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Security</h3>
                        <div class="flex items-center justify-between">
                            <div><p class="text-sm font-medium">Face ID / Biometrics</p></div>
                            <button onclick="${hasBio ? 'removeBiometrics()' : 'setupBiometrics()'}" class="text-xs font-bold ${hasBio ? 'text-red-500' : 'text-green-600'}">
                                ${hasBio ? 'Disable' : 'Set Up'}
                            </button>
                        </div>
                    </div>

                    <div class="glass-card p-6 space-y-4">
                        <button onclick="handleReportProblem()" class="w-full text-left text-sm font-medium text-slate-600">Report a Problem</button>
                        <hr class="border-slate-100">
                        <button onclick="handleLogout()" class="w-full text-left flex items-center justify-between text-sm font-medium text-red-500"><span>Sign Out</span><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>`;
            },
            'add-duty': async () => {
                state.hourMode = 'manual';
                return `<div class="px-2">
                    <h2 class="text-2xl font-bold mb-6">Log Activity</h2>
                    <form onsubmit="handleSaveDuty(event)" class="space-y-4">
                        <input type="text" id="duty-title" placeholder="Event Title" required class="input-field">
                        <input type="text" id="duty-location" placeholder="Location" class="input-field">
                        <input type="date" id="duty-date" value="${new Date().toISOString().split('T')[0]}" required class="input-field">
                        <div class="glass-card p-4 space-y-4">
                            <div class="flex bg-slate-100 p-1 rounded-xl">
                                <button type="button" onclick="setHourMode('manual')" id="mode-manual" class="tab-btn active">Total Hours</button>
                                <button type="button" onclick="setHourMode('auto')" id="mode-auto" class="tab-btn inactive">Auto calc</button>
                            </div>
                            <div id="manual-hours-input"><input type="number" step="0.1" id="duty-hours" placeholder="Hours" class="input-field"></div>
                            <div id="auto-hours-input" class="hidden flex gap-2"><input type="time" id="start-time" class="input-field" oninput="calculateHours()"><input type="time" id="end-time" class="input-field" oninput="calculateHours()"></div>
                            <div id="calc-result" class="hidden text-center text-xs font-bold text-green-600">Calculated: <span id="calc-display">0</span> hrs</div>
                        </div>
                        <textarea id="duty-notes" placeholder="Add shift notes here..." class="input-field min-h-[120px]"></textarea>
                        <button type="submit" class="btn-primary !bg-[#00853F]">Save Activity</button>
                    </form>
                </div>`;
            },
            users: async () => `<div class="p-4 text-center text-slate-400">Users feature loading...</div>`,
            community: async () => `<div class="p-4 text-center text-slate-400">Community feed loading...</div>`
        };

        // --- Event Handlers ---
        window.handleForgotPassword = async () => {
            const email = prompt("Enter your email address to reset your password:");
            if (email) {
                const { error } = await sb.auth.resetPasswordForEmail(email);
                alert(error ? error.message : "Password reset email sent!");
            }
        };

        window.handleReportProblem = () => {
            const issue = prompt("Describe the problem you're experiencing:");
            if (issue) {
                alert("Thank you! Our support team has been notified.");
            }
        };

        window.authenticateBiometrics = async () => {
            try {
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                const options = { publicKey: { challenge, userVerification: "required", timeout: 60000 } };
                const assertion = await navigator.credentials.get(options);
                if (assertion) {
                    state.isUnlocked = true;
                    document.getElementById('privacy-lock').style.display = 'none';
                }
            } catch (err) { console.error(err); }
        };

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        }

        async function handleSignup(e) {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-password').value;
            const name = document.getElementById('signup-name').value;
            const div = document.getElementById('signup-division').value;
            const { data, error } = await sb.auth.signUp({ email, password: pass });
            if (data.user) {
                await sb.from('profiles').upsert({ id: data.user.id, name, division: div });
                router.navigate('login');
            }
            if (error) alert(error.message);
        }

        async function loadDashboardData() {
            if (!state.user) return;
            const { data: duties } = await sb.from('duties').select('*').eq('user_id', state.user.id).order('date', { ascending: false });
            state.currentDuties = duties || [];
            state.totalHours = state.currentDuties.reduce((acc, curr) => acc + (parseFloat(curr.total_hours) || 0), 0);
            
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <div class="space-y-6">
                    <header class="flex justify-between items-center">
                        <div><h1 class="text-xl font-bold">DutyLog</h1><p class="text-xs text-slate-400">${state.profile?.division || 'SJA'}</p></div>
                        <img src="${state.profile?.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+state.user.id}" class="w-10 h-10 rounded-full border-2 border-green-500 object-cover">
                    </header>
                    <div class="glass-card p-6 bg-[#1B263B] text-white">
                        <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest">Logged Hours</p>
                        <h2 class="text-4xl font-black">${state.totalHours.toFixed(1)}</h2>
                    </div>
                    <div class="space-y-3">
                        ${state.currentDuties.map(d => `
                            <div class="glass-card p-4">
                                <div class="flex justify-between items-start">
                                    <div><p class="font-bold text-xs">${d.title}</p><p class="text-[10px] text-slate-400">${d.date} • ${d.location || ''}</p></div>
                                    <p class="font-black text-green-600 text-sm">+${parseFloat(d.total_hours).toFixed(1)}</p>
                                </div>
                                ${d.notes ? `<p class="mt-2 text-[11px] text-slate-500 bg-slate-50 p-2 rounded-lg italic">"${d.notes}"</p>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        }

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                state.user = session.user;
                const { data } = await sb.from('profiles').select('*').eq('id', state.user.id).single();
                state.profile = data;
                if (localStorage.getItem(`bio_reg_${state.user.id}`)) {
                    document.getElementById('privacy-lock').style.display = 'flex';
                    authenticateBiometrics();
                }
                router.navigate('dashboard');
            } else { router.navigate('welcome'); }
            sb.auth.onAuthStateChange((event, newSession) => { if (!newSession) router.navigate('welcome'); else window.location.reload(); });
        }

        window.onload = init;
        window.togglePassword = (id) => {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        };
        window.handleLogout = async () => { await sb.auth.signOut(); router.navigate('welcome'); };
    </script>
</body>
</html>
